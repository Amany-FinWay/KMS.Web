    <div class="flex flex-col h-full">
  <ag-grid-angular
    [theme]="'legacy'"
    class="ag-theme-material"
    [rowData]="paginatedData()"
    [columnDefs]="columnDefs"
    [gridOptions]="gridOptions"
    [context]="{ componentParent: parentReference }">
  </ag-grid-angular>

  <div class="flex items-center justify-end border-t border-slate-200 bg-white px-6 py-4">
    <!-- <div class="text-sm text-slate-500">
      Showing 
      <span class="font-medium text-slate-900">{{ (currentPage() - 1) * pageSize() + 1 }}</span> 
      to 
      <span class="font-medium text-slate-900">{{ Math.min(currentPage() * pageSize(), rowData.length) }}</span> 
      of 
      <span class="font-medium text-slate-900">{{ rowData.length }}</span> results
    </div> -->

    <div class="flex items-center gap-2">
      <button 
        (click)="goToPage(currentPage() - 1)"
        [disabled]="currentPage() === 1"
        class="flex h-9 items-center px-3 text-sm font-medium text-slate-700 border border-slate-300 rounded-xl hover:bg-slate-50 disabled:opacity-50">
        Previous
      </button>

      <div class="flex gap-1">
        @for (i of [].constructor(totalPages()); track $index) {
          <button 
            (click)="goToPage($index + 1)"
            [class]="$index + 1 === currentPage() 
              ? 'h-9 w-9 bg-slate-900 text-white rounded-xl text-sm font-medium' 
              : 'h-9 w-9 text-slate-600 hover:bg-slate-50 rounded-xl text-sm font-medium'">
            {{ $index + 1 }}
          </button>
        }
      </div>

      <button 
        (click)="goToPage(currentPage() + 1)"
        [disabled]="currentPage() === totalPages()"
        class="flex h-9 items-center px-3 text-sm font-medium text-slate-700 border border-slate-300 rounded-xl hover:bg-slate-50 disabled:opacity-50">
        Next
      </button>
    </div>
  </div>
</div>
