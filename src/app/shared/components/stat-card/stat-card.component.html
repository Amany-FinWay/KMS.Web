<div
    class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm flex justify-between items-start h-full">

    <div class="flex flex-col">
        <span class="text-sm text-gray-600 mb-1 font-normal uppercase tracking-tight">{{ label() }}</span>

        <div class="flex items-baseline gap-1">
            <h2 class="text-3xl font-semibold text-gray-900 tracking-tight">{{ value() }}</h2>
            @if (total()) {
            <span class="text-gray-400 font-medium text-lg">/ {{ total() }}</span>
            }
        </div>

        @if (trend()) {
        <div class="flex items-center gap-1 mt-2">
            <span [class]="trend()?.isUp ? 'text-green-600' : 'text-red-600'" class="text-sm font-medium">
                {{ trend()?.isUp ? '↑' : '↓' }} {{ trend()?.value }}
            </span>
        </div>
        }
    </div>

    <div [class]="colorClass() + ' p-3 rounded-lg text-white shadow-sm'">
        <lucide-icon [img]="icon()" class="w-6 h-6"></lucide-icon>
    </div>
</div>
