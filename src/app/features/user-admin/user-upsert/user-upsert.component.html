<div class="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 px-4">
  <div class="w-full max-w-lg rounded-2xl bg-white shadow-2xl" (click)="$event.stopPropagation()">
    <div class="flex items-center justify-between border-b border-slate-200 px-6 py-4">
      <h2 class="text-lg font-semibold text-slate-900">{{ isEditMode() ? 'Edit User' : 'Add New User' }}</h2>
      <button (click)="close()" class="rounded-lg p-2 text-slate-500 hover:bg-slate-100">✕</button>
    </div>

    <div class="max-h-[65vh] overflow-y-auto space-y-4 px-6 py-5">
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700">
          Full Name
        </label>

        <input type="text" [(ngModel)]="addUserModel.fullName"
          placeholder="e.g. John Doe"
          class="h-11 w-full rounded-xl border border-slate-300 px-3 text-sm outline-none focus:border-blue-500" />
      </div>

      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700">
          Username
        </label>

        <input type="text" [(ngModel)]="addUserModel.userName"
          placeholder="e.g. johndoe"
          class="h-11 w-full rounded-xl border border-slate-300 px-3 text-sm outline-none focus:border-blue-500" />
      </div>

      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700">
          Email
        </label>

        <input type="email" [(ngModel)]="addUserModel.email"
            placeholder="e.g. john.doe@example.com"
          class="h-11 w-full rounded-xl border border-slate-300 px-3 text-sm outline-none focus:border-blue-500" />
      </div>

      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700">
          Phone
        </label>

        <input type="text" [(ngModel)]="addUserModel.phoneNumber"
          placeholder="e.g. 20+1234567890"
          class="h-11 w-full rounded-xl border border-slate-300 px-3 text-sm outline-none focus:border-blue-500" />
      </div>

      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700">
          Department
        </label>

        <input type="text" [(ngModel)]="addUserModel.department"
          placeholder="e.g. IT, HR, Sales"
          class="h-11 w-full rounded-xl border border-slate-300 px-3 text-sm outline-none focus:border-blue-500" />
      </div>

      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700">
          Role
        </label>

        <select [(ngModel)]="addUserModel.role"
          class="h-11 w-full rounded-xl border border-slate-300 px-3 text-sm outline-none focus:border-blue-500">
          <option [ngValue]="null" disabled>Select role</option>
          @for (role of roleOptions(); track role.role) {
          <option [ngValue]="mapRoleNameToValue(role.role)">
            {{ role.role }}
          </option>
          }
        </select>
      </div>

      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700">
          Password
        </label>

        <input type="password" [ngModel]="addUserModel.password" (ngModelChange)="onPasswordChange($event)"
          placeholder="Must be at least 8 characters, include uppercase, lowercase, number, and special character"
          class="h-11 w-full rounded-xl border border-slate-300 px-3 text-sm outline-none focus:border-blue-500" />

        @if (passwordErrors().length > 0) {
        <div class="mt-2 space-y-1">
          @for (error of passwordErrors(); track error) {
          <div class="text-xs text-red-500">
            {{ error }}
          </div>
          }
        </div>
        }
      </div>
    </div>

    <div class="flex justify-end gap-3 border-t border-slate-200 px-6 py-4">
      <button (click)="close()" class="h-10 rounded-xl bg-slate-100 px-5 text-sm text-slate-700 hover:bg-slate-200">Cancel</button>
      <button (click)="submit()" class="h-10 rounded-xl bg-blue-600 px-5 text-sm text-white hover:bg-blue-700">{{ isEditMode() ? 'Edit User' : 'Add New User' }}</button>
    </div>
  </div>
</div>
