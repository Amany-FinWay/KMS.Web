<section class="relative h-full w-full min-w-0 overflow-hidden bg-[#F8FAFC]">
  <div class="map-grid absolute inset-0"></div>

  <div
    *ngFor="let kiosk of kiosks"
    class="group absolute -translate-x-1/2 -translate-y-1/2"
    [style.left.%]="kiosk.x"
    [style.top.%]="kiosk.y"
  >
    <button type="button" (click)="selectKiosk(kiosk.id)" class="flex flex-col items-center">
      <span
        class="flex h-[32px] w-[32px] items-center justify-center rounded-full border-[4px] border-white shadow-[0_10px_20px_rgba(15,23,42,0.15)] transition duration-200 group-hover:scale-105"
        [ngClass]="getMarkerColorClass(kiosk.status)"
      >
        <span class="h-[8px] w-[8px] rounded-full bg-white"></span>
      </span>
      <span
        class="-mt-[1px] h-0 w-0 border-l-[7px] border-r-[7px] border-t-[14px] border-l-transparent border-r-transparent"
        [ngClass]="{
          'border-t-[#12B981]': kiosk.status === kioskStatus.Online,
          'border-t-[#F59E0B]': kiosk.status === kioskStatus.Maintenance,
          'border-t-[#EF4444]': kiosk.status === kioskStatus.Error,
          'border-t-[#6B7280]': kiosk.status === kioskStatus.Offline
        }"
      ></span>
    </button>

    <div
      *ngIf="selectedKiosk?.id === kiosk.id"
      class="absolute left-1/2 top-[48px] z-20 w-[240px] -translate-x-1/2 rounded-[18px] border border-[#E4E7EC] bg-white p-4 text-left shadow-[0_16px_40px_rgba(15,23,42,0.12)]"
    >
      <div class="flex items-start justify-between gap-3">
        <div class="min-w-0">
          <div class="text-[12px] font-medium uppercase tracking-[0.08em] text-[#667085]">
            {{ kiosk.code }}
          </div>
          <div class="mt-1 text-[15px] font-semibold leading-5 text-[#101828]">
            {{ kiosk.name }}
          </div>
        </div>

        <span
          class="inline-flex items-center gap-1 rounded-full px-2.5 py-1 text-[11px] font-semibold"
          [ngClass]="{
            'bg-[#ECFDF3] text-[#027A48]': kiosk.status === kioskStatus.Online,
            'bg-[#FFFAEB] text-[#B54708]': kiosk.status === kioskStatus.Maintenance,
            'bg-[#FEF3F2] text-[#B42318]': kiosk.status === kioskStatus.Error,
            'bg-[#F2F4F7] text-[#475467]': kiosk.status === kioskStatus.Offline
          }"
        >
          <lucide-icon [img]="getStatusIcon(kiosk.status)" class="h-3 w-3"></lucide-icon>
          {{ getStatusLabel(kiosk.status) }}
        </span>
      </div>

      <div class="mt-3 text-[13px] text-[#475467]">
        {{ kiosk.location }}
      </div>

      <div class="mt-4 grid grid-cols-2 gap-3 text-[13px] text-[#344054]">
        <div class="rounded-[12px] bg-[#F8FAFC] px-3 py-2">
          <div class="text-[#667085]">Lat</div>
          <div class="mt-1 font-semibold text-[#101828]">{{ kiosk.lat }}</div>
        </div>
        <div class="rounded-[12px] bg-[#F8FAFC] px-3 py-2">
          <div class="text-[#667085]">Lng</div>
          <div class="mt-1 font-semibold text-[#101828]">{{ kiosk.lng }}</div>
        </div>
      </div>
    </div>
  </div>

  <div class="absolute right-9 top-5 flex flex-col overflow-hidden rounded-[16px] bg-white shadow-[0_12px_30px_rgba(15,23,42,0.12)]">
    <button
      type="button"
      class="flex h-[64px] w-[64px] items-center justify-center text-[#475467] transition hover:bg-[#F8FAFC]"
    >
      <lucide-icon [img]="icons.Plus" class="h-5 w-5"></lucide-icon>
    </button>
    <button
      type="button"
      class="flex h-[64px] w-[64px] items-center justify-center border-t border-[#EAECF0] text-[#475467] transition hover:bg-[#F8FAFC]"
    >
      <lucide-icon [img]="icons.Minus" class="h-5 w-5"></lucide-icon>
    </button>
    <button
      type="button"
      class="flex h-[64px] w-[64px] items-center justify-center border-t border-[#EAECF0] text-[#475467] transition hover:bg-[#F8FAFC]"
    >
      <lucide-icon [img]="icons.Send" class="h-5 w-5"></lucide-icon>
    </button>
  </div>

  <div class="absolute bottom-5 left-6 rounded-[18px] border border-[#E4E7EC] bg-white/95 px-4 py-3 shadow-sm backdrop-blur">
    <div class="flex items-center gap-4 text-[13px] text-[#344054]">
      <div class="flex items-center gap-2">
        <span class="h-2.5 w-2.5 rounded-full bg-[#10B981]"></span>
        <span>{{ statusCounts.online }} Active</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="h-2.5 w-2.5 rounded-full bg-[#667085]"></span>
        <span>{{ statusCounts.offline }} Offline</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="h-2.5 w-2.5 rounded-full bg-[#F59E0B]"></span>
        <span>{{ statusCounts.maintenance }} Maintenance</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="h-2.5 w-2.5 rounded-full bg-[#EF4444]"></span>
        <span>{{ statusCounts.error }} Error</span>
      </div>
    </div>
  </div>

  <div class="absolute bottom-5 right-5 rounded-[8px] bg-white px-4 py-2 text-[14px] text-[#475467] shadow-sm">
    Interactive Map View
  </div>
</section>
