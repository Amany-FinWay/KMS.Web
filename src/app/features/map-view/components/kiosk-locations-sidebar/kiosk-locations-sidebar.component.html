<aside class="flex w-[430px] flex-col border-r border-[#E5E7EB] bg-white">
  <div class="border-b border-[#E5E7EB] px-6 py-8">
    <h1 class="text-[20px] font-semibold tracking-[-0.02em] text-[#0F172A]">
      Kiosk Locations
    </h1>

    <div class="mt-6 space-y-4">
      <label class="relative block">
        <lucide-icon
          [img]="icons.Search"
          class="pointer-events-none absolute left-4 top-1/2 h-4 w-4 -translate-y-1/2 text-[#98A2B3]"
        ></lucide-icon>
        <input
          type="text"
          [value]="searchTerm"
          (input)="setSearchTerm(($any($event.target)).value)"
          placeholder="Search kiosks..."
          class="h-[42px] w-full rounded-[14px] border border-[#D0D5DD] bg-white pl-11 pr-4 text-[14px] text-[#0F172A] outline-none transition placeholder:text-[#98A2B3] focus:border-[#2B4AA0]"
        />
      </label>

      <label class="relative block">
        <lucide-icon
          [img]="icons.Filter"
          class="pointer-events-none absolute left-4 top-1/2 h-4 w-4 -translate-y-1/2 text-[#98A2B3]"
        ></lucide-icon>
        <select
          [value]="statusFilter"
          (change)="setStatusFilter($any($event.target).value)"
          class="h-[42px] w-full appearance-none rounded-[14px] border border-[#D0D5DD] bg-white pl-11 pr-10 text-[14px] text-[#0F172A] outline-none transition focus:border-[#2B4AA0]"
        >
          <option *ngFor="let option of statusOptions" [value]="option.value">
            {{ option.label }}
          </option>
        </select>
        <span class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-[#98A2B3]">
          v
        </span>
      </label>
    </div>
  </div>

  <div class="map-scrollbar flex-1 overflow-y-auto">
    <button
      *ngFor="let kiosk of kiosks"
      type="button"
      (click)="selectKiosk(kiosk.id)"
      class="flex w-full items-start gap-3 border-b border-[#EEF2F6] px-4 py-5 text-left transition hover:bg-[#F8FAFC]"
      [ngClass]="selectedKioskId === kiosk.id ? 'bg-[#F8FAFC]' : 'bg-white'"
    >
      <div class="min-w-0 flex-1">
        <div class="flex items-center gap-2 text-[14px] text-[#475467]">
          <span>{{ kiosk.code }}</span>
          <span class="h-2.5 w-2.5 rounded-full" [ngClass]="getStatusDotClass(kiosk.status)"></span>
        </div>

        <div class="mt-2 text-[16px] font-semibold leading-6 text-[#101828]">
          {{ kiosk.name }}
        </div>

        <div class="text-[14px] text-[#475467]">
          {{ kiosk.location }}
        </div>

        <div class="mt-3 flex items-center justify-between text-[14px] text-[#344054]">
          <span>{{ kiosk.transactions }} transactions</span>
          <span>${{ kiosk.revenue }}</span>
        </div>
      </div>

      <div class="mt-1 rounded-[10px] p-1.5 text-[#98A2B3]">
        <lucide-icon [img]="icons.Monitor" class="h-5 w-5"></lucide-icon>
      </div>
    </button>

    <div
      *ngIf="!kiosks.length"
      class="flex h-full min-h-[280px] items-center justify-center px-6 text-center text-[14px] text-[#667085]"
    >
      No kiosks match the current filters.
    </div>
  </div>

  <div class="border-t border-[#E5E7EB] px-4 py-5">
    <div class="text-[14px] font-semibold text-[#101828]">Status Legend</div>

    <div class="mt-4 grid grid-cols-2 gap-x-8 gap-y-3 text-[14px] text-[#344054]">
      <div class="flex items-center gap-2.5">
        <span class="h-4 w-4 rounded-full bg-[#10B981]"></span>
        <span>Online</span>
      </div>
      <div class="flex items-center gap-2.5">
        <span class="h-4 w-4 rounded-full bg-[#EF4444]"></span>
        <span>Error</span>
      </div>
      <div class="flex items-center gap-2.5">
        <span class="h-4 w-4 rounded-full bg-[#F59E0B]"></span>
        <span>Maintenance</span>
      </div>
      <div class="flex items-center gap-2.5">
        <span class="h-4 w-4 rounded-full bg-[#667085]"></span>
        <span>Offline</span>
      </div>
    </div>
  </div>
</aside>
