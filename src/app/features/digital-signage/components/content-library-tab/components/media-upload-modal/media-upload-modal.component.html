<div class="fixed inset-0 z-[80] flex h-full w-full items-center justify-center bg-[rgba(15,23,42,0.5)] p-6" (click)="close.emit()">
  <div class="max-h-[calc(100vh-48px)] w-full max-w-[820px] overflow-y-auto rounded-[28px] bg-white p-8 shadow-[0_24px_48px_rgba(15,23,42,0.18)]" (click)="$event.stopPropagation()">
    <div class="flex items-start justify-between gap-4">
      <div>
        <h3 class="text-[24px] font-semibold text-[#0F172A]">Upload Content</h3>
        <p class="mt-2 text-[14px] text-[#667085]">
          Add media and an optional poster image for preview cards.
        </p>
      </div>

      <button type="button" (click)="close.emit()" class="inline-flex h-[42px] w-[42px] items-center justify-center rounded-[12px] bg-[#F8FAFC] text-[#475467]">
        <lucide-icon [img]="icons.X" class="h-5 w-5"></lucide-icon>
      </button>
    </div>

    <div class="mt-8 space-y-6">
      <section class="rounded-[22px] border border-[#E4E7EC] bg-[#FBFCFE] p-5">
        <div class="mb-4">
          <h4 class="text-[15px] font-semibold text-[#0F172A]">Content Details</h4>
          <p class="mt-1 text-[13px] text-[#667085]">Basic information about the uploaded item.</p>
        </div>

        <div class="grid grid-cols-1 gap-5 md:grid-cols-2">
          <label class="block md:col-span-2">
            <span class="mb-2.5 block text-[14px] font-medium text-[#344054]">Title</span>
            <input type="text" class="min-h-[52px] w-full rounded-[14px] border border-[#D0D5DD] bg-white px-4 text-[14px]" [ngModel]="form().title" (ngModelChange)="updateField('title', $event)" placeholder="Enter content title" />
          </label>

          <label class="block md:col-span-2">
            <span class="mb-2.5 block text-[14px] font-medium text-[#344054]">Description</span>
            <textarea class="min-h-[108px] w-full resize-none rounded-[14px] border border-[#D0D5DD] bg-white px-4 py-4 text-[14px]" [ngModel]="form().description" (ngModelChange)="updateField('description', $event)" placeholder="Short description"></textarea>
          </label>

          <label class="block">
            <span class="mb-2.5 block text-[14px] font-medium text-[#344054]">File Type</span>
            <select class="min-h-[52px] w-full rounded-[14px] border border-[#D0D5DD] bg-white px-4 text-[14px] text-[#0F172A]" [ngModel]="form().selectedFileType" (ngModelChange)="onFileTypeChange($event)">
              <option *ngFor="let option of fileTypeOptions" [ngValue]="option.value">
                {{ option.label }}
              </option>
            </select>
          </label>

          <label class="block">
            <span class="mb-2.5 block text-[14px] font-medium text-[#344054]">Duration In Seconds</span>
            <input type="number" min="0" class="min-h-[52px] w-full rounded-[14px] border border-[#D0D5DD] bg-white px-4 text-[14px]" [ngModel]="form().durationInSeconds" (ngModelChange)="updateField('durationInSeconds', $event ? +$event : null)" placeholder="Optional for video" />
          </label>

          <label class="block md:col-span-2">
            <span class="mb-2.5 block text-[14px] font-medium text-[#344054]">Tags</span>
            <input type="text" class="min-h-[52px] w-full rounded-[14px] border border-[#D0D5DD] bg-white px-4 text-[14px]" [ngModel]="form().tags" (ngModelChange)="updateField('tags', $event)" placeholder="welcome, brand, intro" />
          </label>
        </div>
      </section>

      <section class="rounded-[22px] border border-[#E4E7EC] bg-[#FBFCFE] p-5">
        <div class="mb-4">
          <h4 class="text-[15px] font-semibold text-[#0F172A]">Files</h4>
          <p class="mt-1 text-[13px] text-[#667085]">Upload the main file and an optional poster image.</p>
        </div>

        <div class="grid grid-cols-1 gap-5 lg:grid-cols-2">
          <label class="block">
            <span class="mb-2.5 block text-[14px] font-medium text-[#344054]">Main File</span>
            <label class="flex min-h-[190px] cursor-pointer flex-col items-center justify-center gap-3 rounded-[18px] border border-dashed border-[#98A2B3] bg-white p-6 transition hover:border-[#2563EB] hover:bg-[#F8FBFF]">
              <lucide-icon [img]="icons.Upload" class="h-8 w-8 text-[#2563EB]"></lucide-icon>
              <div class="text-center">
                <p class="text-[15px] font-semibold text-[#0F172A]">{{ form().file?.name || 'Choose media file' }}</p>
                <p class="mt-1 text-[13px] text-[#667085]">Allowed type: {{ getSelectedFileTypeLabel() }}</p>
              </div>
              <input type="file" class="hidden" [attr.accept]="getSelectedAcceptValue()" (change)="onFileSelected($event)" />
            </label>
          </label>

          <div class="block">
            <span class="mb-2.5 block text-[14px] font-medium text-[#344054]">Poster Image (Optional)</span>
            <label class="flex min-h-[190px] cursor-pointer flex-col items-center justify-center gap-3 rounded-[18px] border border-dashed border-[#C7D7F8] bg-white p-6 transition hover:border-[#2563EB] hover:bg-[#F8FBFF]">
              <ng-container *ngIf="thumbnailPreviewUrl(); else thumbnailPlaceholder">
                <img [src]="thumbnailPreviewUrl()" alt="Poster preview" class="h-[118px] w-full rounded-[12px] object-cover" />
                <p class="text-[13px] text-[#475467]">{{ form().thumbnailFile?.name }}</p>
              </ng-container>
              <ng-template #thumbnailPlaceholder>
                <div class="flex h-12 w-12 items-center justify-center rounded-full bg-[#EFF4FF] text-[#2563EB]">
                  <lucide-icon [img]="icons.Upload" class="h-6 w-6"></lucide-icon>
                </div>
                <div class="text-center">
                  <p class="text-[15px] font-semibold text-[#0F172A]">Choose poster image</p>
                  <p class="mt-1 text-[13px] text-[#667085]">JPG, PNG, WEBP or GIF</p>
                </div>
              </ng-template>
              <input type="file" class="hidden" accept=".jpg,.jpeg,.png,.gif,.webp,.bmp" (change)="onThumbnailSelected($event)" />
            </label>
          </div>
        </div>
      </section>
    </div>

    <div class="mt-8 flex items-center justify-end gap-3">
      <button type="button" class="min-h-[48px] rounded-[14px] border border-[#D0D5DD] bg-white px-5 text-[14px] font-semibold text-[#344054]" (click)="close.emit()">Cancel</button>
      <button type="button" class="min-h-[48px] rounded-[14px] bg-[#2563EB] px-5 text-[14px] font-semibold text-white disabled:opacity-60" (click)="submit()" [disabled]="saving()">
        {{ saving() ? 'Uploading...' : 'Upload Content' }}
      </button>
    </div>
  </div>
</div>
