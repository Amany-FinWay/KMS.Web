<section class="rounded-[18px] border border-[#E4E7EC] bg-white p-7">
  <h3 class="text-[18px] font-semibold text-[#101828]">Transaction Status</h3>

  <div class="mt-10 flex min-h-[290px] items-center justify-center">
    <div class="flex w-full items-center justify-center gap-10">
      <div class="space-y-8 text-[16px]">
        <div
          *ngFor="let segment of segments().slice(0, 1)"
          [style.color]="segment.labelColor"
        >
          {{ segment.status }}: {{ segment.percentage }}%
        </div>
      </div>

      <div class="relative h-[180px] w-[180px] rounded-full" [style.background]="pieBackground()">
        <div class="absolute inset-[1px] rounded-full bg-transparent"></div>
      </div>

      <div class="space-y-8 text-[16px]">
        <div
          *ngFor="let segment of segments().slice(1)"
          [style.color]="segment.labelColor"
        >
          {{ segment.status }}: {{ segment.percentage }}%
        </div>
      </div>
    </div>
  </div>
</section>
