<section class="rounded-[18px] border border-[#E4E7EC] bg-white p-7">
  <h3 class="text-[18px] font-semibold text-[#101828]">Select Report Type</h3>

  <div class="mt-7 grid grid-cols-1 gap-5 xl:grid-cols-2">
    <button
      *ngFor="let item of items"
      type="button"
      (click)="selectReport(item.id)"
      class="report-card rounded-[22px] border bg-white px-5 py-5 text-left transition"
      [ngClass]="selectedReportId === item.id ? 'report-card--selected' : 'border-[#DDE3EA] shadow-sm hover:border-[#C9D5F3]'"
    >
      <div class="flex items-start gap-4">
        <div
          class="report-card__icon mt-0.5 flex h-11 w-11 items-center justify-center rounded-[14px]"
          [ngClass]="selectedReportId === item.id ? 'bg-gradient-to-b from-[#4F46E5] to-[#4338CA] text-white shadow-[0_10px_18px_rgba(79,70,229,0.22)]' : 'bg-[#F2F4F7] text-[#475467]'"
        >
          <lucide-icon [img]="icons[item.icon]" class="h-5 w-5"></lucide-icon>
        </div>

        <div class="min-w-0 pt-0.5">
          <h4 class="text-[16px] font-semibold leading-7 text-[#101828]">
            {{ item.title }}
          </h4>

          <p class="mt-1 max-w-[420px] text-[14px] leading-6 text-[#475467]">
            {{ item.description }}
          </p>

          <span
            class="mt-4 inline-flex rounded-full px-3 py-1 text-[14px] font-semibold leading-none"
            [ngClass]="getCategoryClass(item.category)"
          >
            {{ item.category }}
          </span>
        </div>
      </div>
    </button>
  </div>
</section>
