<section *ngIf="selectedReport" class="rounded-[18px] border border-[#E4E7EC] bg-white p-7">
  <div class="flex items-start justify-between gap-4">
    <h3 class="text-[18px] font-semibold text-[#101828]">Report Preview</h3>

    <button
      type="button"
      class="inline-flex h-[50px] items-center justify-center rounded-[16px] bg-gradient-to-b from-[#4F46E5] to-[#4338CA] px-7 text-[16px] font-medium text-white shadow-sm"
    >
      Generate Report
    </button>
  </div>

  <div class="mt-8">
    <h2 class="text-[22px] font-semibold text-[#101828]">
      {{ selectedReport.title }}
    </h2>

    <div class="mt-4 flex flex-wrap items-center gap-3 text-[15px] text-[#475467]">
      <span class="inline-flex items-center gap-2">
        <lucide-icon [img]="icons.CalendarDays" class="h-5 w-5"></lucide-icon>
        {{ preview?.rangeText }}
      </span>
      <span>&bull;</span>
      <span>Generated: {{ preview?.generatedAtText }}</span>
    </div>
  </div>

  <div class="my-7 h-px bg-[#E4E7EC]"></div>

  <div class="flex min-h-[240px] flex-col items-center justify-center rounded-[18px] bg-[#F8FAFC] px-6 text-center">
    <lucide-icon [img]="icons.FileText" class="h-14 w-14 text-[#98A2B3]"></lucide-icon>
    <p class="mt-5 text-[18px] leading-9 text-[#475467]">
      Report preview will be displayed here after generation.
      <br />
      Click "Generate Report" to view detailed data.
    </p>
  </div>
</section>
