<div class="min-h-screen bg-[#F8FAFC] text-slate-900">
  <div class="border-b border-[#E4E7EC] bg-white">
    <div class="mx-auto flex max-w-[1440px] items-center justify-between px-8 py-8">
      <div class="flex items-start gap-4">
        <div class="flex h-14 w-14 items-center justify-center rounded-[16px] bg-gradient-to-b from-[#4F46E5] to-[#4338CA] shadow-sm">
          <lucide-icon [img]="icons.FileText" class="h-7 w-7 text-white"></lucide-icon>
        </div>

        <div>
          <h1 class="text-[28px] font-semibold leading-8 text-slate-950">
            Reports & Analytics
          </h1>
          <p class="mt-2 text-[16px] text-slate-600">
            Generate comprehensive reports and export in multiple formats
          </p>
        </div>
      </div>

      <button
        type="button"
        class="inline-flex h-[48px] items-center justify-center gap-2 rounded-[16px] border border-[#D0D5DD] bg-white px-6 text-[14px] font-medium text-[#101828]"
      >
        <lucide-icon [img]="icons.Filter" class="h-4 w-4"></lucide-icon>
        Show Filters
      </button>
    </div>
  </div>

  <div class="mx-auto max-w-[1440px] px-8 py-9">
    <div class="grid grid-cols-1 gap-7 xl:grid-cols-[minmax(0,1fr)_410px]">
      <div class="space-y-7">
        <app-report-type-grid
          [items]="reportTypes"
          [selectedReportId]="selectedReportId()"
          (reportSelected)="selectReport($event)"
        ></app-report-type-grid>

        <app-report-preview
          [selectedReport]="selectedReport()"
          [preview]="preview"
        ></app-report-preview>
      </div>

      <app-reports-sidebar
        [selectedReport]="selectedReport()"
        [exportOptions]="exportOptions"
        [quickStats]="quickStats"
        [scheduledReports]="scheduledReports"
      ></app-reports-sidebar>
    </div>
  </div>
</div>
