<div class="min-h-screen bg-[#f8f8fb] text-slate-900">
  <div class="mx-auto max-w-[1440px] px-8 py-8">
    <div class="flex items-start gap-4">
      <div class="flex h-16 w-16 items-center justify-center rounded-2xl bg-gradient-to-b from-violet-600 to-fuchsia-500 shadow-sm">
        <lucide-icon [img]="icons.Package" class="h-7 w-7 text-white"></lucide-icon>
      </div>

      <div>
        <h1 class="text-[28px] font-semibold leading-8 text-slate-950">
          Deployment & Licensing
        </h1>
        <p class="mt-2 text-[16px] text-slate-600">
          Manage kiosk agents, deployments, licenses, and documentation
        </p>
      </div>
    </div>

    <div class="mt-8 inline-flex rounded-2xl border border-slate-200 bg-white p-1">
      <button
        type="button"
        (click)="setTab('kiosk-agent')"
        class="inline-flex items-center gap-2 rounded-xl px-5 py-2.5 text-[15px] font-medium transition"
        [ngClass]="activeTab() === 'kiosk-agent'
          ? 'bg-slate-100 text-slate-950'
          : 'text-slate-700 hover:bg-slate-50'"
      >
        <lucide-icon [img]="icons.Download" class="h-4 w-4"></lucide-icon>
        Kiosk Agent
      </button>

      <button
        type="button"
        (click)="setTab('deployment')"
        class="inline-flex items-center gap-2 rounded-xl px-5 py-2.5 text-[15px] font-medium transition"
        [ngClass]="activeTab() === 'deployment'
          ? 'bg-slate-100 text-slate-950'
          : 'text-slate-700 hover:bg-slate-50'"
      >
        <lucide-icon [img]="icons.Boxes" class="h-4 w-4"></lucide-icon>
        Deployment
      </button>

      <button
        type="button"
        (click)="setTab('licensing')"
        class="inline-flex items-center gap-2 rounded-xl px-5 py-2.5 text-[15px] font-medium transition"
        [ngClass]="activeTab() === 'licensing'
          ? 'bg-slate-100 text-slate-950'
          : 'text-slate-700 hover:bg-slate-50'"
      >
        <lucide-icon [img]="icons.KeyRound" class="h-4 w-4"></lucide-icon>
        Licensing
      </button>

      <button
        type="button"
        (click)="setTab('documentation')"
        class="inline-flex items-center gap-2 rounded-xl px-5 py-2.5 text-[15px] font-medium transition"
        [ngClass]="activeTab() === 'documentation'
          ? 'bg-slate-100 text-slate-950'
          : 'text-slate-700 hover:bg-slate-50'"
      >
        <lucide-icon [img]="icons.BookOpen" class="h-4 w-4"></lucide-icon>
        Documentation
      </button>
    </div>
  </div>

  <div class="border-t border-slate-200"></div>

  <div class="mx-auto max-w-[1440px] px-8 py-8">
    <app-kiosk-agent-tab *ngIf="activeTab() === 'kiosk-agent'"></app-kiosk-agent-tab>
    <app-deployment-tab *ngIf="activeTab() === 'deployment'"></app-deployment-tab>
    <app-licensing-tab *ngIf="activeTab() === 'licensing'"></app-licensing-tab>
    <app-documentation-tab *ngIf="activeTab() === 'documentation'"></app-documentation-tab>
  </div>
</div>
