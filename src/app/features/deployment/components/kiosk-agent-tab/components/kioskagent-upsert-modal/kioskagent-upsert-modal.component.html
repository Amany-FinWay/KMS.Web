<div class="fixed inset-0 z-[10000] flex items-center justify-center bg-slate-950/55 p-4 backdrop-blur-[2px]">
  <div class="w-full max-w-[760px] max-h-[85vh] overflow-hidden rounded-[24px] bg-white shadow-[0_30px_90px_rgba(15,23,42,0.22)]">
    <!-- Header -->
   <div class="border-b border-slate-200 bg-gradient-to-r from-violet-600 via-fuchsia-500 to-purple-500 px-6 py-5 text-white">
      <div class="flex items-start justify-between gap-4">
        <div>
          <h3 class="text-[24px] font-bold leading-none">Create Agent Package</h3>
          <p class="mt-2 text-sm text-white/90">
            Fill in the package details exactly as required by the backend.
          </p>
        </div>

        <button
          type="button"
          (click)="close.emit()"
          class="flex h-10 w-10 items-center justify-center rounded-full bg-white/15 transition hover:bg-white/25"
        >
          <lucide-icon [img]="icons.X" class="h-5 w-5"></lucide-icon>
        </button>
      </div>
    </div>

    <!-- Body -->
   <div class="max-h-[calc(85vh-140px)] overflow-y-auto px-6 py-6">
      <div class="grid grid-cols-1 gap-5 md:grid-cols-2">
        <div class="space-y-2">
          <label class="text-sm font-semibold text-slate-700">Agent Type</label>
          <select
            [value]="form().agentType"
            (change)="updateForm('agentType', $any($event.target).value)"
            class="h-12 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm outline-none transition focus:border-violet-500 focus:bg-white"
          >
            <option *ngFor="let item of agentTypeOptions" [value]="item.value">
              {{ item.label }}
            </option>
          </select>
        </div>

        <div class="space-y-2">
          <label class="text-sm font-semibold text-slate-700">Platform</label>
          <select
            [value]="form().platform"
            (change)="updateForm('platform', $any($event.target).value)"
            class="h-12 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm outline-none transition focus:border-violet-500 focus:bg-white"
          >
            <option *ngFor="let item of platformOptions" [value]="item.value">
              {{ item.label }}
            </option>
          </select>
        </div>

        <div class="space-y-2">
          <label class="text-sm font-semibold text-slate-700">Package Name</label>
          <input
            [value]="form().name"
            (input)="updateForm('name', $any($event.target).value)"
            placeholder="e.g. Kiosk Agent"
            class="h-12 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm outline-none transition focus:border-violet-500 focus:bg-white"
          />
        </div>

        <div class="space-y-2">
          <label class="text-sm font-semibold text-slate-700">Version</label>
          <input
            [value]="form().version"
            (input)="updateForm('version', $any($event.target).value)"
            placeholder="e.g. 2.4.2"
            class="h-12 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm outline-none transition focus:border-violet-500 focus:bg-white"
          />
        </div>

        <div class="space-y-2">
          <label class="text-sm font-semibold text-slate-700">Minimum OS</label>
          <input
            [value]="form().minimumOs"
            (input)="updateForm('minimumOs', $any($event.target).value)"
            placeholder="e.g. Windows 10 / Ubuntu 20.04 LTS"
            class="h-12 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm outline-none transition focus:border-violet-500 focus:bg-white"
          />
        </div>

        <div class="space-y-2">
          <label class="text-sm font-semibold text-slate-700">Release Date</label>
          <input
            type="date"
            [value]="form().releasedAt"
            (input)="updateForm('releasedAt', $any($event.target).value)"
            class="h-12 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm outline-none transition focus:border-violet-500 focus:bg-white"
          />
        </div>
      </div>

      <!-- Upload -->
      <div class="mt-6">
        <label class="mb-2 block text-sm font-semibold text-slate-700">Package File</label>

        <label
          class="flex cursor-pointer flex-col items-center justify-center rounded-[24px] border-2 border-dashed border-violet-200 bg-violet-50/60 px-6 py-8 text-center transition hover:border-violet-400 hover:bg-violet-50"
        >
          <div class="mb-3 flex h-14 w-14 items-center justify-center rounded-full bg-white shadow-sm">
            <lucide-icon [img]="icons.UploadCloud" class="h-7 w-7 text-violet-600"></lucide-icon>
          </div>

          <p class="text-[15px] font-semibold text-slate-800">
            {{ form().file ? form().file?.name : 'Upload package zip file' }}
          </p>
          <p class="mt-1 text-sm text-slate-500">Only .zip files are allowed</p>

          <input
            type="file"
            accept=".zip,application/zip"
            (change)="onFileSelected($event)"
            class="hidden"
          />
        </label>
      </div>

      <!-- Toggles -->
      <div class="mt-6 grid grid-cols-1 gap-4 md:grid-cols-2">
        <label class="flex items-center gap-3 rounded-2xl border border-slate-200 bg-slate-50 px-4 py-4">
          <input
            type="checkbox"
            [checked]="form().active"
            (change)="updateForm('active', $any($event.target).checked)"
            class="h-4 w-4 rounded border-slate-300 text-violet-600"
          />
          <div>
            <p class="text-sm font-semibold text-slate-800">Active</p>
            <p class="text-xs text-slate-500">Package will be available for users</p>
          </div>
        </label>

        <label class="flex items-center gap-3 rounded-2xl border border-slate-200 bg-slate-50 px-4 py-4">
          <input
            type="checkbox"
            [checked]="form().isLatest"
            (change)="updateForm('isLatest', $any($event.target).checked)"
            class="h-4 w-4 rounded border-slate-300 text-violet-600"
          />
          <div>
            <p class="text-sm font-semibold text-slate-800">Latest Version</p>
            <p class="text-xs text-slate-500">Marks this package as the latest for its platform</p>
          </div>
        </label>
      </div>
    </div>

    <!-- Footer -->
    <div class="flex items-center justify-end gap-3 border-t border-slate-200 bg-slate-50 px-6 py-4">
      <button
        type="button"
        (click)="close.emit()"
        class="h-11 rounded-2xl border border-slate-200 bg-white px-5 text-sm font-semibold text-slate-700 transition hover:bg-slate-100"
      >
        Cancel
      </button>

      <button
        type="button"
        (click)="onSubmit()"
        [disabled]="saving()"
        class="inline-flex h-11 items-center justify-center rounded-2xl bg-gradient-to-r from-violet-600 to-fuchsia-500 px-6 text-sm font-semibold text-white shadow-sm transition hover:opacity-95 disabled:cursor-not-allowed disabled:opacity-60"
      >
        {{ saving() ? 'Creating...' : 'Create Package' }}
      </button>
    </div>
  </div>
</div>
