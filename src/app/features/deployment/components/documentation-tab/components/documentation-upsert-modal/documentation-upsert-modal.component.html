<div class="fixed inset-0 z-[10000] flex items-center justify-center bg-slate-950/55 p-4 backdrop-blur-[2px]">
  <div class="w-full max-w-[760px] max-h-[85vh] overflow-hidden rounded-[24px] bg-white shadow-[0_30px_90px_rgba(15,23,42,0.22)]">
    <div class="border-b border-slate-200 bg-gradient-to-r from-violet-600 via-fuchsia-500 to-purple-500 px-6 py-5 text-white">
      <div class="flex items-start justify-between gap-4">
        <div>
          <h3 class="text-[24px] font-bold leading-none">Upload Documentation</h3>
          <p class="mt-2 text-sm text-white/90">
            Add a documentation resource exactly as required by the backend.
          </p>
        </div>

        <button
          type="button"
          (click)="close.emit()"
          class="flex h-10 w-10 items-center justify-center rounded-full bg-white/15 transition hover:bg-white/25"
        >
          <lucide-icon [img]="icons.X" class="h-5 w-5"></lucide-icon>
        </button>
      </div>
    </div>

    <div class="max-h-[calc(85vh-140px)] overflow-y-auto px-6 py-6">
      <div class="grid grid-cols-1 gap-5 md:grid-cols-2">
        <div class="space-y-2">
          <label class="text-sm font-semibold text-slate-700">Title</label>
          <input
            [value]="form().title"
            (input)="updateForm('title', $any($event.target).value)"
            placeholder="e.g. Installation Guide"
            class="h-12 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm outline-none transition focus:border-violet-500 focus:bg-white"
          />
        </div>

        <div class="space-y-2">
          <label class="text-sm font-semibold text-slate-700">Category</label>
          <select
            [value]="form().category"
            (change)="updateForm('category', $any($event.target).value)"
            class="h-12 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm outline-none transition focus:border-violet-500 focus:bg-white"
          >
            <option *ngFor="let item of categoryOptions" [value]="item.value">
              {{ item.label }}
            </option>
          </select>
        </div>

        <div class="space-y-2 md:col-span-2">
          <label class="text-sm font-semibold text-slate-700">Description</label>
          <textarea
            [value]="form().description"
            (input)="updateForm('description', $any($event.target).value)"
            rows="3"
            placeholder="Write a short description..."
            class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm outline-none transition focus:border-violet-500 focus:bg-white"
          ></textarea>
        </div>

        <div class="space-y-2">
          <label class="text-sm font-semibold text-slate-700">Resource Type</label>
          <select
            [value]="form().resourceType"
            (change)="onResourceTypeChange($any($event.target).value)"
            class="h-12 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm outline-none transition focus:border-violet-500 focus:bg-white"
          >
            <option *ngFor="let item of resourceTypeOptions" [value]="item.value">
              {{ item.label }}
            </option>
          </select>
        </div>

        <div class="space-y-2" *ngIf="isVideoType()">
          <label class="text-sm font-semibold text-slate-700">Duration (Minutes)</label>
          <input
            type="number"
            min="0"
            [value]="form().durationInMinutes ?? ''"
            (input)="updateForm('durationInMinutes', $any($event.target).value)"
            placeholder="e.g. 15"
            class="h-12 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm outline-none transition focus:border-violet-500 focus:bg-white"
          />
        </div>

        <div class="space-y-2 md:col-span-2" *ngIf="isLinkType()">
          <label class="text-sm font-semibold text-slate-700">URL</label>
          <input
            [value]="form().url"
            (input)="updateForm('url', $any($event.target).value)"
            placeholder="https://example.com/docs"
            class="h-12 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm outline-none transition focus:border-violet-500 focus:bg-white"
          />
        </div>
      </div>

      <div class="mt-6" *ngIf="isFileType()">
        <label class="mb-2 block text-sm font-semibold text-slate-700">File</label>

        <label
          class="flex cursor-pointer flex-col items-center justify-center rounded-[24px] border-2 border-dashed border-violet-200 bg-violet-50/60 px-6 py-8 text-center transition hover:border-violet-400 hover:bg-violet-50"
        >
          <div class="mb-3 flex h-14 w-14 items-center justify-center rounded-full bg-white shadow-sm">
            <lucide-icon [img]="icons.UploadCloud" class="h-7 w-7 text-violet-600"></lucide-icon>
          </div>

          <p class="text-[15px] font-semibold text-slate-800">
            {{ form().file ? form().file?.name : 'Upload resource file' }}
          </p>
          <p class="mt-1 text-sm text-slate-500">
            PDF or video file depending on selected resource type
          </p>

          <input
            type="file"
            (change)="onFileSelected($event)"
            class="hidden"
          />
        </label>
      </div>

      <div class="mt-6">
        <label class="flex items-center gap-3 rounded-2xl border border-slate-200 bg-slate-50 px-4 py-4">
          <input
            type="checkbox"
            [checked]="form().active"
            (change)="updateForm('active', $any($event.target).checked)"
            class="h-4 w-4 rounded border-slate-300 text-violet-600"
          />
          <div>
            <p class="text-sm font-semibold text-slate-800">Active</p>
            <p class="text-xs text-slate-500">Resource will be visible in documentation page</p>
          </div>
        </label>
      </div>
    </div>

    <div class="flex items-center justify-end gap-3 border-t border-slate-200 bg-slate-50 px-6 py-4">
      <button
        type="button"
        (click)="close.emit()"
        class="h-11 rounded-2xl border border-slate-200 bg-white px-5 text-sm font-semibold text-slate-700 transition hover:bg-slate-100"
      >
        Cancel
      </button>

      <button
        type="button"
        (click)="onSubmit()"
        [disabled]="saving()"
        class="inline-flex h-11 items-center justify-center rounded-2xl bg-gradient-to-r from-violet-600 to-fuchsia-500 px-6 text-sm font-semibold text-white shadow-sm transition hover:opacity-95 disabled:cursor-not-allowed disabled:opacity-60"
      >
        {{ saving() ? 'Uploading...' : 'Upload Documentation' }}
      </button>
    </div>
  </div>
</div>
