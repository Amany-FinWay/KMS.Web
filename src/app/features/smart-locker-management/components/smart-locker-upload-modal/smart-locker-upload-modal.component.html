<div class="fixed inset-0 z-[10000] flex items-center justify-center bg-black/70 p-4">
  <div class="w-full max-w-[460px] rounded-[18px] bg-white p-6 shadow-[0_30px_90px_rgba(0,0,0,0.25)]">
    <div class="mb-5 flex items-center justify-between">
      <h3 class="text-[20px] font-semibold text-[#0F172A]">Upload Assignment CSV</h3>

      <button
        type="button"
        (click)="close.emit()"
        class="flex h-9 w-9 items-center justify-center rounded-full bg-slate-100 transition hover:bg-slate-200"
      >
        <lucide-icon [img]="icons.X" class="h-4 w-4 text-slate-700"></lucide-icon>
      </button>
    </div>

    <div class="space-y-4">
      <div>
        <label class="mb-2 block text-[15px] font-medium text-[#0F172A]">
          Select CSV File
        </label>

        <input
          type="file"
          accept=".csv,text/csv"
          (change)="onFileSelected($event)"
          class="block h-[44px] w-full rounded-[12px] border border-[#CBD5E1] px-3 py-2 text-[14px]"
        />
      </div>

      <div class="rounded-[12px] border border-[#93C5FD] bg-[#EFF6FF] px-4 py-4 text-[14px] leading-6 text-[#1D4ED8]">
        <span class="font-semibold">CSV Format:</span>
        Locker ID, Compartment ID, Compartment Number, Size, Product ID, Product Name, Barcode, Customer Name, Customer Phone
      </div>

      <div class="grid grid-cols-2 gap-3 pt-2">
        <button
          type="button"
          (click)="close.emit()"
          class="h-[46px] rounded-[12px] bg-[#F1F5F9] text-[15px] font-medium text-[#334155] transition hover:bg-[#E2E8F0]"
        >
          Cancel
        </button>

        <button
          type="button"
          (click)="onSubmit()"
          [disabled]="saving() || !file()"
          class="h-[46px] rounded-[12px] bg-gradient-to-r from-[#8B5CF6] to-[#7C3AED] text-[15px] font-semibold text-white shadow-[0_12px_30px_rgba(139,92,246,0.35)] transition hover:opacity-95 disabled:cursor-not-allowed disabled:opacity-90"
        >
          {{ saving() ? 'Uploading...' : 'Upload & Process' }}
        </button>
      </div>
    </div>
  </div>
</div>
