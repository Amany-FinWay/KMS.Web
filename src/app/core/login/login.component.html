<div class="relative min-h-screen overflow-hidden bg-slate-950">

  <!-- Aurora Background -->
  <div class="absolute inset-0">
    
    <!-- gradient blobs -->
    <div class="absolute left-[-150px] top-[-120px] h-[420px] w-[420px] rounded-full bg-blue-500/30 blur-[140px]"></div>
    
    <div class="absolute right-[-120px] top-[100px] h-[380px] w-[380px] rounded-full bg-violet-500/30 blur-[140px]"></div>

    <div class="absolute bottom-[-150px] left-[30%] h-[420px] w-[420px] rounded-full bg-cyan-400/25 blur-[140px]"></div>

    <!-- soft gradient overlay -->
    <div class="absolute inset-0 bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950"></div>

  </div>

  <!-- Content -->
  <div class="relative z-10 flex min-h-screen items-center justify-center px-6 py-10">

    <div class="w-full max-w-[460px]">

      <!-- Login Card -->
      <div class="rounded-[28px] border border-white/10 bg-white/90 p-8 shadow-[0_25px_80px_rgba(0,0,0,0.45)] backdrop-blur-xl sm:p-10">

        <div class="text-center">

          <h1 class="text-[36px] font-semibold tracking-[-0.04em] text-slate-950">
            Welcome back
          </h1>

          <p class="mt-2 text-[15px] text-slate-600">
            Sign in to continue to your dashboard
          </p>

        </div>

        <!-- Form -->
        <form class="mt-8 space-y-5" (ngSubmit)="onLogin()">

          <!-- Email -->
          <div>
            <label class="mb-2 block text-sm font-semibold text-slate-800">
              Email Address
            </label>

            <div class="relative">

              <lucide-icon
                [img]="iconList.Mail"
                class="pointer-events-none absolute left-4 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400"
              ></lucide-icon>

              <input
                type="email"
                name="email"
                [(ngModel)]="email"
                placeholder="Enter your email"
                class="h-14 w-full rounded-2xl border border-slate-300 bg-white pl-12 pr-4 text-[15px] text-slate-900 outline-none placeholder:text-slate-400 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10"
              />

            </div>
          </div>

          <!-- Password -->
          <div>
            <label class="mb-2 block text-sm font-semibold text-slate-800">
              Password
            </label>

            <div class="relative">

              <lucide-icon
                [img]="iconList.Lock"
                class="pointer-events-none absolute left-4 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400"
              ></lucide-icon>

              <input
                [type]="showPassword() ? 'text' : 'password'"
                name="password"
                [(ngModel)]="password"
                placeholder="Enter your password"
                class="h-14 w-full rounded-2xl border border-slate-300 bg-white pl-12 pr-12 text-[15px] text-slate-900 outline-none placeholder:text-slate-400 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10"
              />

              <button
                type="button"
                (click)="togglePasswordVisibility()"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 transition hover:text-slate-700"
              >
                <lucide-icon
                  [img]="showPassword() ? iconList.EyeOff : iconList.Eye"
                  class="h-5 w-5"
                ></lucide-icon>
              </button>

            </div>
          </div>

          <!-- Options -->
          <div class="flex items-center justify-between text-sm">

            <label class="flex items-center gap-2 text-slate-600">
              <input
                type="checkbox"
                name="rememberMe"
                [(ngModel)]="rememberMe"
                class="h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500"
              />
              Remember me
            </label>

            <button
              type="button"
              class="font-medium text-blue-600 hover:text-blue-700"
            >
              Forgot password?
            </button>

          </div>

          <!-- Button -->
          <button
            type="submit"
            class="mt-2 inline-flex h-14 w-full items-center justify-center rounded-2xl bg-slate-950 text-[16px] font-semibold text-white shadow-lg transition hover:bg-blue-600"
          >
            Sign In
          </button>

        </form>

        <!-- Footer -->
        <div class="mt-8 border-t border-slate-200 pt-6 text-center">
          <p class="text-sm text-slate-500">
            Secure administrator access
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
